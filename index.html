<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Welcome to Tubalar{% endblock %}</title>
    <title>Tubalar</title>
<link rel="stylesheet" href="static/css/style.css">
<body>
    <nav>
        <a href="index.html" class="logo">Tubalar</a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

     <main>
        <section class="hero">
            <h1>Welcome to Tubalar</h1>
            <p>This is a catalogue for everything I do, in one place.</p>
            <a href="about.html" class="btn">Learn More</a>
        </section>

        <section class="gallery">
            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="static/images/photo1.png" alt="Photo 1" onclick="openLightbox(this)">
                </div>
                <div class="gallery-item">
                    <img src="static/images/photo2.png" alt="Photo 2" onclick="openLightbox(this)">
                </div>
                <div class="gallery-item">
                    <img src="static/images/photo3.png" alt="Photo 3" onclick="openLightbox(this)">
                </div>
            </div>
        </section>

        <!-- Lightbox overlay -->
        <div id="lightbox">
            <img id="lightbox-img" src="" alt="">
        </div>
    </main>

    <script>
        function openLightbox(img) {
            document.getElementById('lightbox-img').src = img.src;
            document.getElementById('lightbox').classList.add('active');
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>


    <footer>
        <p>🐍</p>
    </footer>
</body>
</html>
