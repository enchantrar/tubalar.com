<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tubalar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

    <nav class="nav">
        <a href="index.html" class="nav-logo">Tubalar</a>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-link active">Home</a></li>
            <li><a href="about.html" class="nav-link">About</a></li>
            <li><a href="contact.html" class="nav-link">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-tag">✦ Welcome</div>
        <h1 class="hero-title">Every&shy;thing<br><em>I Do,</em><br>One Place.</h1>
        <p class="hero-sub">A catalogue of work, ideas, and everything in between.</p>
        <a href="about.html" class="hero-btn">Meet me →</a>
        <div class="hero-blob blob-1"></div>
        <div class="hero-blob blob-2"></div>
        <div class="hero-blob blob-3"></div>
    </section>

    <section class="gallery">
        <div class="gallery-header">
            <span class="gallery-label">✦ Selected Work</span>
        </div>
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="static/images/photo1.png" alt="Photo 1" onclick="openLightbox(this)">
                <div class="gallery-overlay">View ↗</div>
            </div>
            <div class="gallery-item">
                <img src="static/images/photo2.png" alt="Photo 2" onclick="openLightbox(this)">
                <div class="gallery-overlay">View ↗</div>
            </div>
            <div class="gallery-item">
                <img src="static/images/photo3.png" alt="Photo 3" onclick="openLightbox(this)">
                <div class="gallery-overlay">View ↗</div>
            </div>
        </div>
    </section>

    <div id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <img id="lightbox-img" src="" alt="">
    </div>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if (e.isIntersecting) e.target.classList.add('visible');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.gallery-item').forEach(el => observer.observe(el));

        function openLightbox(img) {
            document.getElementById('lightbox-img').src = img.src;
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>

</body>
</html>
